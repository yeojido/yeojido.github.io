<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JS10ZVJZKX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JS10ZVJZKX');

    <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>소득 여지도 — 시군구별 평균소득</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root { --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --bg:#f8fafc; --accent:#059669; }
        * { box-sizing:border-box; }
        html, body { margin:0; padding:0; height:100%;
            font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif; color:var(--ink); }
        #map { position:fixed; top:0; left:0; width:100vw; height:100vh; }

        #header { position:fixed; top:0; left:0; right:0; z-index:30; display:flex; align-items:center; gap:14px;
            flex-wrap:wrap; padding:10px 16px; background:rgba(255,255,255,0.96); box-shadow:0 1px 8px rgba(0,0,0,0.08); backdrop-filter:blur(6px); }
        #count { font-size:12.5px; color:var(--muted); font-weight:600; }

        .ymenu { position:relative; }
        .ymenu-trigger { display:flex; align-items:center; gap:7px; cursor:pointer; background:none; border:none;
            padding:2px 4px; font-family:inherit; font-size:18px; font-weight:800; letter-spacing:-0.5px; color:var(--ink); }
        .ymenu-trigger .tk { font-size:17px; } .ymenu-trigger .caret { font-size:11px; color:var(--muted); }
        .ymenu-pop { position:absolute; top:calc(100% + 9px); left:0; min-width:212px; background:#fff;
            border:1px solid var(--line); border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.16); padding:6px; z-index:50; display:none; }
        .ymenu-pop.open { display:block; }
        .ymi { display:flex; align-items:center; gap:9px; padding:9px 11px; border-radius:8px;
            text-decoration:none; color:var(--ink); font-size:13.5px; font-weight:600; }
        .ymi:hover { background:#f3f4f6; } .ymi.active { background:#ecfdf5; color:var(--accent); }
        .ymi .ico { font-size:16px; width:20px; text-align:center; } .ymi-sep { height:1px; background:var(--line); margin:5px 6px; }

        #controls { position:fixed; top:60px; left:16px; z-index:25; width:268px; max-width:92vw;
            background:rgba(255,255,255,0.97); border-radius:14px; box-shadow:0 2px 14px rgba(0,0,0,0.14); padding:14px 16px; }
        #controls label { font-size:11.5px; color:var(--muted); font-weight:700; display:block; margin:2px 0 4px; }
        #controls select { width:100%; font-size:13.5px; font-weight:700; padding:7px 9px;
            border:1.5px solid var(--line); border-radius:8px; background:#fff; color:var(--ink); outline:none; }
        #controls select:focus { border-color:var(--accent); }
        #metaNote { margin-top:11px; padding-top:10px; border-top:1px solid var(--line); font-size:11px; color:var(--muted); line-height:1.6; }

        #legend { position:fixed; left:16px; bottom:16px; z-index:20; background:rgba(255,255,255,0.96);
            border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.12); padding:11px 13px; font-size:11.5px; }
        #legend .bar { width:180px; height:12px; border-radius:3px; margin:6px 0 3px;
            background:linear-gradient(90deg,#d1fae5,#10b981 55%,#064e3b); }
        #legend .ends { display:flex; justify-content:space-between; color:var(--muted); }
        #legend .ttl { font-weight:700; }

        #panel { position:fixed; top:0; right:0; z-index:40; width:360px; max-width:92vw; height:100%;
            background:var(--bg); box-shadow:-4px 0 24px rgba(0,0,0,0.16); transform:translateX(105%);
            transition:transform .28s cubic-bezier(.4,0,.2,1); overflow-y:auto; }
        #panel.open { transform:translateX(0); }
        .phead { position:sticky; top:0; z-index:2; padding:16px 18px 14px; color:#fff;
            background:linear-gradient(135deg,#047857,var(--accent)); }
        .phead .close { position:absolute; top:12px; right:12px; z-index:5; cursor:pointer; width:30px; height:30px;
            border-radius:50%; border:none; background:rgba(255,255,255,0.22); color:#fff; font-size:17px; }
        .phead .sido, .phead h2 { padding-right:34px; }
        .phead .sido { font-size:12px; opacity:.9; font-weight:600; }
        .phead h2 { margin:3px 0 0; font-size:21px; font-weight:800; letter-spacing:-0.5px; }
        .phead .big { margin-top:8px; font-size:13px; opacity:.95; } .phead .big b { font-size:24px; }
        .pbody { padding:14px 16px 40px; }
        .pkpi { display:flex; gap:9px; margin-bottom:12px; }
        .pkpi .b { flex:1; background:#fff; border:1px solid var(--line); border-radius:12px; padding:11px 12px; }
        .pkpi .lab { font-size:11px; color:var(--muted); font-weight:600; }
        .pkpi .val { font-size:19px; font-weight:800; margin-top:2px; } .pkpi .val small { font-size:12px; color:var(--muted); font-weight:600; }
        .card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:13px 14px; }
        .card h3 { margin:0 0 4px; font-size:13.5px; } .card .sub { font-size:11.5px; color:var(--muted); font-weight:500; }
        .chart-wrap { position:relative; height:320px; margin-top:8px; }
        .note { font-size:11px; color:var(--muted); line-height:1.55; margin-top:12px; }

        #tip { position:fixed; z-index:35; pointer-events:none; display:none; background:rgba(31,41,55,0.92);
            color:#fff; font-size:12px; font-weight:600; padding:5px 9px; border-radius:7px; white-space:nowrap; }
        .src-credit { position:fixed; bottom:5px; right:14px; z-index:15; font-size:10.5px; color:rgba(31,41,55,0.6);
            background:rgba(255,255,255,0.7); padding:2px 8px; border-radius:6px; pointer-events:none;
            max-width:72vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        #spinner { position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center;
            background:rgba(255,255,255,0.85); font-weight:700; color:var(--muted); }
        #spinner.hidden { display:none; }
        .ring { width:38px; height:38px; border:4px solid var(--line); border-top-color:var(--accent);
            border-radius:50%; animation:spin .9s linear infinite; } @keyframes spin { to { transform:rotate(360deg); } }
        @media (max-width:640px) {
            .ymenu-trigger .t { display:none; }
            #controls { top:auto; bottom:14px; left:8px; right:8px; width:auto; }
            #legend { display:none; }
            #panel { width:100%; max-width:100%; height:80%; top:auto; bottom:0; border-radius:18px 18px 0 0;
                transform:translateY(105%); } #panel.open { transform:translateY(0); }
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="header">
        <div class="ymenu">
            <button class="ymenu-trigger" onclick="toggleYmenu(event)">
                <span class="tk">💰</span><span class="t">소득 여지도</span><span class="caret">▾</span>
            </button>
            <div class="ymenu-pop" id="ymenuPop">
                <a class="ymi" href="/"><span class="ico">🏠</span>여지도 홈</a>
                <div class="ymi-sep"></div>
                <a class="ymi" href="/speetomap/"><span class="ico">🎟️</span>스피또 여지도</a>
                <a class="ymi" href="/hakgunmap/"><span class="ico">🎓</span>학군 여지도</a>
                <a class="ymi" href="/barmap/"><span class="ico">🏋️</span>철봉 여지도</a>
                <a class="ymi" href="/popmap/"><span class="ico">👶</span>인구 여지도</a>
                <a class="ymi" href="/foreignmap/"><span class="ico">🌏</span>외국인 여지도</a>
                <a class="ymi" href="/childmap/"><span class="ico">🏥</span>어린이병원 여지도</a>
                <a class="ymi" href="/runningmap/"><span class="ico">🏃</span>러닝코스 여지도</a>
                <a class="ymi active" href="/incomemap/"><span class="ico">💰</span>소득 여지도</a>
            </div>
        </div>
        <span id="count"></span>
    </div>

    <div id="controls">
        <label>지역(시·도)</label>
        <select id="sidoSel"><option value="">전국</option></select>
        <div id="metaNote"></div>
    </div>

    <div id="legend">
        <div class="ttl">1인당 평균소득</div>
        <div class="bar"></div>
        <div class="ends"><span id="legendMin">–</span><span id="legendMax">–</span></div>
    </div>

    <div id="tip"></div>
    <div class="src-credit">데이터 · 국세청 시군구별 근로소득 연말정산</div>

    <div id="panel">
        <div class="phead" id="phead">
            <button class="close" onclick="closePanel()">✕</button>
            <div class="sido" id="pSido"></div>
            <h2 id="pName"></h2>
            <div class="big" id="pBig"></div>
        </div>
        <div class="pbody" id="pbody"></div>
    </div>

    <div id="spinner"><div style="text-align:center"><div class="ring"></div><div style="margin-top:12px">소득 데이터를 불러오는 중…</div></div></div>

    <script type="text/javascript"
        src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=er3cf0cgom&callback=initMap"></script>
    <script>
    let map, geo = null, meta = null, activeSido = '';
    let rawByCode = {}, panelCode = null, panelChart = null;
    let natAvg = 0, ranked = [];   // ranked: 전국 평균소득 내림차순 code 배열
    const LOW = [209, 250, 229], MID = [16, 185, 129], HIGH = [6, 78, 59];

    window.navermap_authFailure = () => showErr('네이버 지도 인증 실패: 현재 주소가 등록돼 있어야 합니다.');

    function initMap() {
        map = new naver.maps.Map('map', {
            center: new naver.maps.LatLng(36.5, 127.8), zoom: 7,
            zoomControl: true, zoomControlOptions: { position: naver.maps.Position.RIGHT_CENTER },
            mapDataControl: false, scaleControl: false
        });
        loadData();
    }

    function loadData() {
        fetch('./income.geojson')
            .then(r => { if (!r.ok) throw new Error('네트워크 오류'); return r.json(); })
            .then(g => {
                geo = g; meta = g.meta || {};
                natAvg = meta['전국평균'] || 0;
                g.features.forEach(f => { rawByCode[f.properties.code] = f.properties; });
                ranked = g.features.map(f => f.properties.code)
                    .sort((a, b) => rawByCode[b].avg - rawByCode[a].avg);
                setupControls();
                drawData(g);
                document.getElementById('spinner').classList.add('hidden');
            })
            .catch(e => { console.error(e); showErr('데이터를 불러오지 못했습니다.'); });
    }

    function setupControls() {
        const ssel = document.getElementById('sidoSel');
        [...new Set(geo.features.map(f => f.properties.sido))].forEach(s => {
            const o = document.createElement('option'); o.value = s; o.textContent = s; ssel.appendChild(o);
        });
        ssel.addEventListener('change', () => {
            activeSido = ssel.value;
            map.data.setStyle(styleFn); fitToSido(activeSido); updateCounts();
            if (panelCode && rawByCode[panelCode].sido !== activeSido && activeSido) closePanel();
        });
        const ref = meta['통계기준'] || '';
        document.getElementById('metaNote').innerHTML =
            `지표 · <b>근로소득 1인당 평균</b><br>전국평균 <b>${natAvg.toLocaleString()}만원</b> · 기준 ${ref}<br>` +
            `<span style="color:#9ca3af">중위소득은 시군구 공개통계가 없어 미제공</span>`;
        document.querySelector('.src-credit').textContent =
            `데이터 · 국세청 시군구별 근로소득 연말정산 (${ref})`;
    }

    function isVisible(code) { return !activeSido || (rawByCode[code] && rawByCode[code].sido === activeSido); }
    function visExtent() {
        let mn = Infinity, mx = 0;
        for (const c in rawByCode) if (isVisible(c)) { mn = Math.min(mn, rawByCode[c].avg); mx = Math.max(mx, rawByCode[c].avg); }
        return [mn === Infinity ? 0 : mn, mx || 1];
    }
    function lerp(a, b, t) { return a.map((x, i) => Math.round(x + (b[i] - x) * t)); }
    function colorOf(v, mn, mx) {
        if (!v) return '#eef0f3';
        const t = Math.max(0, Math.min(1, (v - mn) / (mx - mn || 1)));
        const c = t < 0.5 ? lerp(LOW, MID, t / 0.5) : lerp(MID, HIGH, (t - 0.5) / 0.5);
        return `rgb(${c[0]},${c[1]},${c[2]})`;
    }

    function drawData(g) {
        map.data.addGeoJson({ type: 'FeatureCollection', features: g.features });
        map.data.setStyle(styleFn);
        map.data.addListener('click', e => openPanel(e.feature.getProperty('code')));
        map.data.addListener('mouseover', e => { map.data.overrideStyle(e.feature, { fillOpacity: 0.97, strokeWeight: 2 }); showTip(e); });
        map.data.addListener('mouseout', () => { map.data.revertStyle(); showTip(null); });
        map.data.addListener('mousemove', e => showTip(e));
        updateCounts();
    }

    function styleFn(feature) {
        const code = feature.getProperty('code');
        if (!isVisible(code)) return { fillOpacity: 0, strokeWeight: 0, strokeOpacity: 0, clickable: false };
        const [mn, mx] = visExtent();
        return { fillColor: colorOf(rawByCode[code].avg, mn, mx), fillOpacity: 0.82,
                 strokeColor: '#ffffff', strokeWeight: 0.8, clickable: true };
    }

    function fitToSido(sido) {
        let mnLa = 99, mxLa = -99, mnLo = 999, mxLo = -999, n = 0;
        for (const f of geo.features) {
            if (sido && f.properties.sido !== sido) continue;
            walkCoords(f.geometry.coordinates, (lng, lat) => {
                mnLa = Math.min(mnLa, lat); mxLa = Math.max(mxLa, lat);
                mnLo = Math.min(mnLo, lng); mxLo = Math.max(mxLo, lng); n++;
            });
        }
        if (!n) return;
        map.fitBounds(new naver.maps.LatLngBounds(new naver.maps.LatLng(mnLa, mnLo), new naver.maps.LatLng(mxLa, mxLo)));
    }
    function walkCoords(a, cb) {
        if (typeof a[0] === 'number') { cb(a[0], a[1]); return; }
        for (const x of a) walkCoords(x, cb);
    }

    function updateCounts() {
        const vis = geo.features.filter(f => isVisible(f.properties.code));
        document.getElementById('count').textContent = `${vis.length}개 시군구`;
        const [mn, mx] = visExtent();
        document.getElementById('legendMin').textContent = mn.toLocaleString() + '만';
        document.getElementById('legendMax').textContent = mx.toLocaleString() + '만';
    }

    function showTip(e) {
        const tip = document.getElementById('tip');
        if (!e) { tip.style.display = 'none'; return; }
        const p = rawByCode[e.feature.getProperty('code')];
        tip.innerHTML = `${p.sido} ${p.name} · 평균 <b>${p.avg.toLocaleString()}만원</b>`;
        tip.style.display = 'block';
        const pt = e.pointerEvent || e.domEvent;
        if (pt) { tip.style.left = (pt.clientX + 12) + 'px'; tip.style.top = (pt.clientY + 12) + 'px'; }
    }

    function openPanel(code) {
        panelCode = code;
        const p = rawByCode[code];
        const rank = ranked.indexOf(code) + 1, n = ranked.length;
        const diff = natAvg ? Math.round((p.avg / natAvg - 1) * 100) : 0;
        const diffStr = (diff > 0 ? '+' : '') + diff + '%';
        document.getElementById('pSido').textContent = p.sido + (p.poly && p.poly !== p.name ? ' · ' + p.poly : '');
        document.getElementById('pName').textContent = p.name;
        document.getElementById('pBig').innerHTML = `1인당 평균소득 <b>${p.avg.toLocaleString()}</b> 만원`;

        let html = '<div class="pkpi">';
        html += `<div class="b"><div class="lab">전국 순위</div><div class="val">${rank}<small> / ${n}위</small></div></div>`;
        html += `<div class="b"><div class="lab">전국평균 대비</div><div class="val" style="color:${diff >= 0 ? '#059669' : '#dc2626'}">${diffStr}</div></div>`;
        html += '</div>';
        html += `<div class="pkpi"><div class="b"><div class="lab">근로소득자</div>
            <div class="val" style="font-size:16px">${(p.earners || 0).toLocaleString()}<small> 명</small></div></div></div>`;
        html += `<div class="card"><h3>${p.sido} 시군구 평균소득 <span class="sub">만원 · 높은순</span></h3>
            <div class="chart-wrap"><canvas id="rankChart"></canvas></div></div>`;
        html += `<div class="note">· 근로소득 연말정산 신고분(주소지) 기준 1인당 평균 급여총계입니다.<br>
            · 일반구(예: 수원시 장안구)는 시(수원시) 단위 값으로 표시됩니다.<br>
            · 중위소득은 시군구 단위 공개통계가 없어 제공하지 않습니다.</div>`;
        document.getElementById('pbody').innerHTML = html;
        document.getElementById('panel').classList.add('open');
        renderRankChart(code);
    }

    function renderRankChart(code) {
        const p = rawByCode[code];
        if (!document.getElementById('rankChart')) return;
        const peers = geo.features.filter(f => f.properties.sido === p.sido)
            .map(f => f.properties).sort((a, b) => b.avg - a.avg);
        const labels = peers.map(x => x.name), data = peers.map(x => x.avg);
        const colors = peers.map(x => x.code === code ? '#047857' : '#6ee7b7');
        if (panelChart) panelChart.destroy();
        Chart.defaults.font.family = "'Malgun Gothic', sans-serif";
        panelChart = new Chart(document.getElementById('rankChart'), {
            type: 'bar',
            data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 3 }] },
            options: {
                indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false },
                    tooltip: { callbacks: { label: c => c.parsed.x.toLocaleString() + '만원' } } },
                scales: { x: { beginAtZero: false, ticks: { callback: v => v.toLocaleString() } },
                          y: { grid: { display: false }, ticks: { font: { size: 10 } } } }
            }
        });
    }

    function closePanel() { document.getElementById('panel').classList.remove('open'); panelCode = null; }

    function toggleYmenu(e) { e.stopPropagation(); document.getElementById('ymenuPop').classList.toggle('open'); }
    document.addEventListener('click', () => { const p = document.getElementById('ymenuPop'); if (p) p.classList.remove('open'); });

    function showErr(msg) {
        document.getElementById('spinner').innerHTML = `<div style="color:#dc2626;font-weight:700;text-align:center;max-width:360px;padding:20px">${msg}</div>`;
        document.getElementById('spinner').classList.remove('hidden');
    }
    </script>
</body>
</html>
