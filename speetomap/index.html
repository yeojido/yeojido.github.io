<body>
    <style>

    <div id="spinner" class="spinner-container">
        <div class="loader">
            Loading...
        </div>
    </div>
    <div id="wrap">
        <button onclick="updateMarkers(map, markers);" class="upper-float">Refresh</button>
        <button onclick="setCurrentPosition();" class="float">+</button>
        <!-- header -->
        <div id="header">
            <div class="inner_header">
                <h1>스피또여지도</h1>
            </div>
        </div>
        <!-- //header -->
        <!-- container -->
        <div id="container">
            <div id="map" class="api_position"></div>
        </div>
        <!-- footer -->
        <div id="footer">
            <div class="inner_footer">
                <div class="footer_copright">
                    Author: <a
                        href="https://eine.tistory.com/entry/%ED%8F%89%ED%96%89%EB%B4%89-%EB%B0%8F-%EC%B2%A0%EB%B4%89-%EC%A7%80%EB%8F%84-%EA%B0%9C%EB%B0%9C%EA%B8%B0"
                        target="_blank">Einstrasse</a> / Issue Report: <a
                        href="https://github.com/Einstrasse/einstrasse.github.io/issues">Click Here!</a>
                </div>
            </div>
        </div>
        <!-- //footer -->
    </div>

    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=er3cf0cgom&callback=initMap"></script>

    <script>
        // Naver Map API 인증 실패 처리
        window.navermap_authFailure = function() {
            console.error('Naver Map API 인증 실패');
            alert('지도를 불러올 수 없습니다. 잠시 후 다시 시도해주세요.');
            // 스피너 숨기기
            let spinner = document.getElementById('spinner');
            if (spinner) {
                spinner.style.visibility = 'hidden';
            }
        };

        let HOME_PATH = window.HOME_PATH || '.';

        let map, markers = [], infoWindows = [], openedInfoWindow = null;
        let curPosInfoWindow;
        let rawMarkerData = [];

        // Naver Map API 로드 완료 후 호출되는 콜백 함수
        function initMap() {
            try {
                map = new naver.maps.Map('map', {
                    center: new naver.maps.LatLng(37.48, 127.035),
                    zoom: 15,
                    zoomControl: true,
                    zoomControlOptions: {
                        position: naver.maps.Position.TOP_RIGHT
                    }
                });

                curPosInfoWindow = new naver.maps.InfoWindow();

                // 이벤트 리스너 설정
                setupEventListeners();

                // 현재 위치로 이동
                setCurrentPosition();

                // 마커 데이터 로드
                loadMarkerData();

            } catch (error) {
                console.error('지도 초기화 실패:', error);
                alert('지도를 초기화하는 중 오류가 발생했습니다.');
                let spinner = document.getElementById('spinner');
                if (spinner) {
                    spinner.style.visibility = 'hidden';
                }
            }
        }

        // 마커 데이터 로드
        function loadMarkerData() {
            console.log("마커 데이터 로드 시작");
            let spinner = document.getElementById('spinner');
            spinner.style.visibility = 'visible';

            fetch("./speeto-map.json")
                .then(response => {
                    if (!response.ok) {
                        throw new Error('네트워크 응답이 올바르지 않습니다.');
                    }
                    return response.json();
                })
                .then(MarkerData => {
                    rawMarkerData = MarkerData.map(item => {
                        item.position = new naver.maps.LatLng(item.pos[0], item.pos[1]);
                        return item;
                    });

                    console.log(`${rawMarkerData.length}개의 마커 데이터 로드 완료`);
                    spinner.style.visibility = 'hidden';
                    
                    // 초기 마커 업데이트
                    setTimeout(() => {
                        updateMarkers(map, markers);
                    }, 0);
                })
                .catch(error => {
                    console.error('마커 데이터 로드 실패:', error);
                    alert('판매점 데이터를 불러오는데 실패했습니다.');
                    spinner.style.visibility = 'hidden';
                });
        }

        // 이벤트 리스너 설정
        function setupEventListeners() {
            // 지도 클릭 시 열린 InfoWindow 닫기
            naver.maps.Event.addListener(map, 'click', function() {
                curPosInfoWindow.close();
                if (openedInfoWindow && openedInfoWindow.getMap()) {
                    openedInfoWindow.close();
                }
            });

            // 지도 이동 완료 시 마커 업데이트 (선택적 - 현재는 수동 refresh 사용)
            // naver.maps.Event.addListener(map, 'idle', function() {
            //     updateMarkers(map, markers);
            // });
        }

        function onSuccessGeolocation(position) {
            let location = new naver.maps.LatLng(position.coords.latitude,
                position.coords.longitude);
            map.setCenter(location); // 얻은 좌표를 지도의 중심으로 설정합니다.
            //map.setZoom(15); // 지도의 줌 레벨을 변경합니다.
            if (curPosInfoWindow.getMap()) {
                curPosInfoWindow.close();
            }
            curPosInfoWindow.setContent(`<div style="padding:10px;"><b>현재 위치</b><br>${location.toString()}</div>`);

            curPosInfoWindow.open(map, location);
            console.log('Coordinates: ' + location.toString());
        }

        function onErrorGeolocation() {
            // let center = map.getCenter();

            // infowindow.setContent('<div style="padding:20px;">' +
            //     '<h5 style="margin-bottom:5px;color:#f00;">Geolocation failed!</h5>'+ "latitude: "+ center.lat() +"<br />longitude: "+ center.lng() +'</div>');

            // infowindow.open(map, center);
        }

        let setCurrentPosition = function () {
            if (navigator.geolocation) {
                /**
                 * navigator.geolocation 은 Chrome 50 버젼 이후로 HTTP 환경에서 사용이 Deprecate 되어 HTTPS 환경에서만 사용 가능 합니다.
                 * http://localhost 에서는 사용이 가능하며, 테스트 목적으로, Chrome 의 바로가기를 만들어서 아래와 같이 설정하면 접속은 가능합니다.
                 * chrome.exe --unsafely-treat-insecure-origin-as-secure="http://example.com"
                 */
                navigator.geolocation.getCurrentPosition(onSuccessGeolocation, onErrorGeolocation);
            } else {
                console.log("Geolocation이 지원되지 않습니다.");
                alert("현재 위치를 가져올 수 없습니다.");
            }
        };

        // 마커 생성 함수
        function processMarker(data, markers, infoWindows) {
            let marker = new naver.maps.Marker({
                map: map,
                position: data.position,
                title: data.title,
                zIndex: 100
            });
            let sell_items = [];
            if (data.speeto500 === "Y") sell_items.push("<li>스피또500</li>");
            if (data.speeto1000 === "Y") sell_items.push("<li>스피또1000</li>");
            if (data.speeto2000 === "Y") sell_items.push("<li>스피또2000</li>");
            if (data.annuity === "Y") sell_items.push("<li>연금복권</li>");
            let infoWindow = new naver.maps.InfoWindow({
                content:
                    `<div class="infowindow">` +
                    `<b>${data.title}</b>` +
                    `<p>주소: ${data.addr}</p>` +
                    `<ul>${sell_items.join("")}</ul>` +
                    `<p style="font-size:11px;color:#888;">확인일: ${data.date || '미상'}</p>` +
                    `</div>`
            });

            let retIndex = markers.length;
            markers.push(marker);
            infoWindows.push(infoWindow);
            return retIndex;
        }

        // 마커 업데이트 함수 (최적화된 버전)
        function updateMarkers(map, markers) {
            if (!map || !rawMarkerData) return;

            let spinner = document.getElementById('spinner');
            spinner.style.visibility = 'visible';
            console.log("마커 업데이트 시작", spinner.style.visibility);
            
            setTimeout(() => {
                let ts0 = new Date().getTime();

                let mapBounds = map.getBounds();
    
                // 현재 뷰포트에 있는 미처리 마커 처리
                for (let item of rawMarkerData) {
                    if (item.processed) continue;
                    if (mapBounds.hasLatLng(item.position)) {
                        let markerIndex = processMarker(item, markers, infoWindows);
                        item.processed = true;
                        naver.maps.Event.addListener(markers[markerIndex], 'click', getClickHandler(markerIndex));
                    }
                }
    
                let ts1 = new Date().getTime();
                console.log(`마커 전처리 완료: ${ts1-ts0}ms / 전체 ${rawMarkerData.length}개`);
    
                // 처리된 마커 제거
                rawMarkerData = rawMarkerData.filter(item => !item.processed);
                
                let ts2 = new Date().getTime();
                console.log(`미처리 마커 필터링 완료: ${ts2-ts1}ms / 남은 ${rawMarkerData.length}개`);
    
                // 현재 뷰포트에 맞게 마커 표시/숨김
                for (let i = 0; i < markers.length; i++) {
                    let marker = markers[i];
                    let position = marker.getPosition();
                    
                    if (mapBounds.hasLatLng(position)) {
                        showMarker(map, marker);
                    } else {
                        hideMarker(map, marker);
                    }
                }

                spinner.style.visibility = 'hidden';
                let ts3 = new Date().getTime();
                console.log(`마커 표시/숨김 완료: ${ts3-ts2}ms / 표시된 마커 ${markers.length}개`);
            }, 1);
        }

        function showMarker(map, marker) {
            if (marker.setMap()) return;
            marker.setMap(map);
        }

        function hideMarker(map, marker) {
            if (!marker.setMap()) return;
            marker.setMap(null);
        }

        // 해당 마커의 인덱스를 seq라는 클로저 변수로 저장하는 이벤트 핸들러를 반환합니다.
        function getClickHandler(seq) {
            return function (e) {
                let marker = markers[seq],
                    infoWindow = infoWindows[seq];

                if (infoWindow.getMap()) {
                    infoWindow.close();
                } else {
                    openedInfoWindow = infoWindow;
                    infoWindow.open(map, marker);
                }
            }
        }

    </script>
