    // Naver Map API 로드 완료 후 호출되는 콜백 함수
    function initMap() {
        try {
            map = new naver.maps.Map('map', {
                center: new naver.maps.LatLng(37.48, 127.035),
                zoom: 13,
                zoomControl: true,
                zoomControlOptions: {
                    position: naver.maps.Position.TOP_RIGHT
                }
            });

            curPosInfoWindow = new naver.maps.InfoWindow();

            // 마커 초기화
            initializeMarkers();

            // 이벤트 리스너 등록
            setupEventListeners();

            // 현재 위치로 이동
            setCurrentPosition();

        } catch (error) {
            console.error('지도 초기화 실패:', error);
            alert('지도를 초기화하는 중 오류가 발생했습니다.');
        }
    }

    // 마커 초기화 함수
    function initializeMarkers() {
        for (let i in MarkerData) {
            let data = MarkerData[i];
            let position = new naver.maps.LatLng(data.pos[0], data.pos[1]);

            let marker = new naver.maps.Marker({
                map: map,
                position: position,
                title: data.title,
                zIndex: 100
            });

            let infoWindow = new naver.maps.InfoWindow({
                content: `<div class="infowindow"><b>${data.title}</b><p>${data.detail}</p><br><img class="bar-img" src="${data.img}" alt="${data.title}"/></div>`
            });

            markers.push(marker);
            infoWindows.push(infoWindow);
        }
    }

    // 이벤트 리스너 설정
    function setupEventListeners() {
        // 지도 이동 완료 시 마커 업데이트
        naver.maps.Event.addListener(map, 'idle', function() {
            updateMarkers(map, markers);
        });

        // 각 마커에 클릭 이벤트 등록
        for (let i = 0; i < markers.length; i++) {
            naver.maps.Event.addListener(markers[i], 'click', getClickHandler(i));
        }

        // 지도 클릭 시 열린 InfoWindow 닫기
        naver.maps.Event.addListener(map, 'click', function() {
            curPosInfoWindow.close();
            if (openedInfoWindow && openedInfoWindow.getMap()) {
                openedInfoWindow.close();
            }
        });
    }

    function onSuccessGeolocation(position) {
        let location = new naver.maps.LatLng(position.coords.latitude,
                                             position.coords.longitude);
        map.setCenter(location); // 얻은 좌표를 지도의 중심으로 설정합니다.
        //map.setZoom(15); // 지도의 줌 레벨을 변경합니다.
        if (curPosInfoWindow.getMap()) {
            curPosInfoWindow.close();
        }
        curPosInfoWindow.setContent(`<div style="padding:10px;"><b>현재 위치</b><br>${location.toString()}</div>`);

        curPosInfoWindow.open(map, location);
        console.log('Coordinates: ' + location.toString());
    }

        if (navigator.geolocation) {
            /**
             * navigator.geolocation 은 Chrome 50 버젼 이후로 HTTP 환경에서 사용이 Deprecate 되어 HTTPS 환경에서만 사용 가능 합니다.
             * http://localhost 에서는 사용이 가능하며, 테스트 목적으로, Chrome 의 바로가기를 만들어서 아래와 같이 설정하면 접속은 가능합니다.
             * chrome.exe --unsafely-treat-insecure-origin-as-secure="http://example.com"
             */
            navigator.geolocation.getCurrentPosition(onSuccessGeolocation, onErrorGeolocation);
        } else {
            console.log("Geolocation이 지원되지 않습니다.");
            alert("현재 위치를 가져올 수 없습니다.");
        }
    };

    function updateMarkers(map, markers) {

        let mapBounds = map.getBounds();
        let marker, position;

        for (let i = 0; i < markers.length; i++) {

            marker = markers[i]
            position = marker.getPosition();

            if (mapBounds.hasLatLng(position)) {
                showMarker(map, marker);
            } else {
                hideMarker(map, marker);
            }
        }
    }

    function showMarker(map, marker) {
        if (marker.setMap()) return;
        marker.setMap(map);
    }

    function hideMarker(map, marker) {
        if (!marker.setMap()) return;
        marker.setMap(null);
    }

    // 해당 마커의 인덱스를 seq라는 클로저 변수로 저장하는 이벤트 핸들러를 반환합니다.
    function getClickHandler(seq) {
        return function(e) {
            let marker = markers[seq],
                infoWindow = infoWindows[seq];

            if (infoWindow.getMap()) {
                infoWindow.close();
            } else {
                openedInfoWindow = infoWindow;
                infoWindow.open(map, marker);
            }
        }
    }

    // ── 여지도 전환 메뉴 ──
    function toggleYmenu(e) {
        e.stopPropagation();
        document.getElementById('ymenuPop').classList.toggle('open');
    }
    document.addEventListener('click', function () {
        var p = document.getElementById('ymenuPop');
        if (p) p.classList.remove('open');
    });

</script>
